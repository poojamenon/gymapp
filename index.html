<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gym Exercise Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f4f4;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  header {
    background: #fff;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #e0e0e0;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #111;
  }

  .search-wrap {
    padding: 16px 20px 8px;
  }

  .search-wrap input {
    width: 100%;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px 16px;
    color: #111;
    font-size: 16px;
    outline: none;
  }

  .search-wrap input::placeholder { color: #aaa; }

  .day-filter {
    display: flex;
    gap: 8px;
    padding: 8px 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-filter::-webkit-scrollbar { display: none; }

  .day-btn {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 8px 16px;
    color: #666;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .day-btn.active {
    background: #e8a000;
    border-color: #e8a000;
    color: #fff;
  }

  .exercise-list {
    padding: 0 20px 100px;
  }

  .exercise-card {
    background: #fff;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid #e0e0e0;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .exercise-card.open {
    border-color: #e8a000;
    box-shadow: 0 2px 12px rgba(232,160,0,0.15);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
  }

  .card-left { flex: 1; }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #c27f00;
    margin-bottom: 4px;
  }

  .card-meta {
    font-size: 13px;
    color: #888;
  }

  .card-days {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .day-tag {
    background: #f0f0f0;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    color: #666;
  }

  .chevron {
    font-size: 20px;
    color: #bbb;
    transition: transform 0.25s;
    margin-left: 12px;
    flex-shrink: 0;
  }
  .exercise-card.open .chevron { transform: rotate(180deg); color: #e8a000; }

  .card-body {
    display: none;
    border-top: 1px solid #f0f0f0;
  }
  .exercise-card.open .card-body { display: block; }

  .exercise-image-wrap {
    background: #f8f8f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 180px;
    overflow: hidden;
  }

  .exercise-image-wrap img {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    display: block;
  }

  .exercise-image-wrap.hidden { display: none; }

  .card-body-inner {
    padding: 0 16px 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #e8a000;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 14px 0 8px;
  }

  .steps ol {
    padding-left: 20px;
  }
  .steps li {
    font-size: 14px;
    color: #333;
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .tips ul {
    padding-left: 20px;
  }
  .tips li {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .muscles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .muscle-tag {
    background: #f0f0f0;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: #444;
  }

  .no-results {
    text-align: center;
    color: #aaa;
    font-size: 15px;
    padding: 60px 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Exercise Guide</h1>
</header>

<div class="search-wrap">
  <input type="search" id="search" placeholder="Search exercises..." autocomplete="off">
</div>

<div class="day-filter">
  <button class="day-btn active" data-day="all">All</button>
  <button class="day-btn" data-day="1">Day 1</button>
  <button class="day-btn" data-day="2">Day 2</button>
  <button class="day-btn" data-day="3">Day 3</button>
</div>

<div class="exercise-list" id="list"></div>

let activeDay = "all";
let query = "";

function imgHtml(images) {
  if (!images || images.length === 0) return '';
  const toSrc = u => u.startsWith('http') ? u : BASE + u;
  const src0 = toSrc(images[0]);
  const src1 = images[1] ? toSrc(images[1]) : null;
  return `
    <div class="exercise-image-wrap" id="imgwrap-CARDID">
      <img
        src="${src0}"
        data-src0="${src0}"
        data-src1="${src1 || src0}"
        data-state="0"
        onclick="toggleImg(this); event.stopPropagation();"
        onerror="this.closest('.exercise-image-wrap').classList.add('hidden')"
        alt="Exercise demonstration"
      >
    </div>`;
}

function render() {
  const list = document.getElementById("list");
  const q = query.toLowerCase().trim();

  const filtered = exercises.filter(e => {
    const dayMatch = activeDay === "all" || e.days.includes(Number(activeDay));
    const nameMatch = e.name.toLowerCase().includes(q) || e.muscles.some(m => m.toLowerCase().includes(q));
    return dayMatch && nameMatch;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No exercises found</div>';
    return;
  }

  list.innerHTML = filtered.map((e, i) => {
    const imgBlock = imgHtml(e.images).replace('CARDID', i);
    return `
    <div class="exercise-card" id="card-${i}" onclick="toggle(${i})">
      <div class="card-header">
        <div class="card-left">
          <div class="card-name">${e.name}</div>
          <div class="card-meta">${e.sets}</div>
          <div class="card-days">
            ${e.days.map(d => `<span class="day-tag">Day ${d}</span>`).join('')}
          </div>
        </div>
        <span class="chevron">&#8964;</span>
      </div>
      <div class="card-body">
        ${imgBlock}
        <div class="card-body-inner">
          <div class="section-label">How to do it</div>
          <div class="steps"><ol>${e.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>
          <div class="section-label">Muscles</div>
          <div class="muscles">${e.muscles.map(m => `<span class="muscle-tag">${m}</span>`).join('')}</div>
          <div class="section-label">Form tips</div>
          <div class="tips"><ul>${e.tips.map(t => `<li>${t}</li>`).join('')}</ul></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  const card = document.getElementById(`card-${i}`);
  card.classList.toggle('open');
}

function toggleImg(img) {
  const state = img.dataset.state === "0" ? "1" : "0";
  img.src = state === "0" ? img.dataset.src0 : img.dataset.src1;
  img.dataset.state = state;
}

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDay = btn.dataset.day;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

render();
</script>
</body>
</html>
